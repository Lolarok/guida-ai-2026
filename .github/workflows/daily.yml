name: Daily AI News Build

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 07:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests deep-translator

      - name: Collect news
        run: python scripts/news_scraper.py

      - name: Translate to Italian
        run: python scripts/translator.py

      - name: Scan AI tools
        run: python scripts/tools_scanner.py

      - name: Generate daily guide
        run: python scripts/guide_generator.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ news/ tools/ -f
          git diff --staged --quiet || git commit -m "📰 Daily update $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
